name: Build TV Debug APK

# 手动触发:Actions 页面 → 选 "Build TV Debug APK" → Run workflow
# 这样不浪费 Actions 资源,你想跑才跑。
on:
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK (No Keystore Required)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      # 复用上游 setup action:Node 18 + Java 17 + gradle 缓存
      - name: Setup Env (Node + Java 17)
        uses: ./.github/actions/setup

      - name: Bundle JS for debug APK
        # debug APK 默认从 Metro 拉 JS,离线装上会红屏 "Unable to load script"。
        # 这里先打 JS bundle 嵌入 APK,变成 standalone 离线可跑。
        working-directory: .
        run: |
          mkdir -p android/app/src/main/assets
          npx --yes react-native bundle \
            --platform android \
            --dev true \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload all APKs (arm64 + armv7 + x86 + universal)
        # 国产电视大部分是 armeabi-v7a (32-bit ARM) 不是 arm64,
        # 所以必须把所有 ABI 都上传,让用户选匹配的装。
        uses: actions/upload-artifact@v4
        with:
          name: lx-music-tv-debug-all
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7